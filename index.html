<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>playlistm</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet" />
    <style>
        :root {
            --bg-color: #0f0e0d;
            --card-bg: rgba(28, 25, 23, 0.85);
            --accent: #c5a367;
            --text-main: #e2d9d0;
            --text-dim: #968d85;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(197, 163, 103, 0.2);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }
        body {
            background: var(--bg-color);
            color: var(--text-main);
            font-family: 'Noto Sans KR', sans-serif;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 50% -20%, #3d3428 0%, transparent 50%),
                url("https://www.transparenttextures.com/patterns/stardust.png");
        }

        .wrapper {
            max-width: 500px;
            margin: 0 auto;
            padding: 40px 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        /* --- HEADER --- */
        header { text-align: center; margin-bottom: 10px; }
        header h1 { 
            font-family: 'Cinzel', serif; 
            font-size: 2.8rem; 
            letter-spacing: 6px; 
            color: var(--accent);
            text-transform: lowercase;
            font-weight: 400;
        }

        /* --- PLAYER CARD (Premium UI) --- */
        .player-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 40px 30px;
            backdrop-filter: blur(10px);
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            position: relative;
            text-align: center;
        }

        .vinyl-box {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 0 auto 30px;
        }
        .vinyl {
            width: 100%; height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle, #222 30%, #000 100%);
            border: 4px solid #111;
            box-shadow: 0 0 0 10px rgba(0,0,0,0.2);
            animation: rotate 10s linear infinite;
            animation-play-state: paused;
            position: relative;
        }
        .vinyl::after {
            content: ''; position: absolute; inset: 0; border-radius: 50%;
            background: repeating-radial-gradient(rgba(255,255,255,0.03) 0, transparent 2px);
        }
        .vinyl.playing { animation-play-state: running; }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .info-box h2 { font-family: 'Cinzel', serif; font-size: 1.5rem; margin-bottom: 5px; color: #fff; }
        .info-box p { color: var(--accent); font-size: 0.9rem; letter-spacing: 2px; }

        /* --- RATING --- */
        .rating-box { margin: 15px 0; }
        .stars { display: flex; justify-content: center; gap: 8px; font-size: 1.4rem; cursor: pointer; }
        .star { color: #333; transition: 0.3s; }
        .star.active { color: var(--accent); text-shadow: 0 0 10px rgba(197, 163, 103, 0.5); }

        /* --- CONTROLS --- */
        .controls { display: flex; justify-content: center; align-items: center; gap: 30px; margin-top: 25px; }
        .btn { background: none; border: none; color: var(--text-main); cursor: pointer; font-size: 1.1rem; transition: 0.3s; }
        .btn:hover { color: var(--accent); }
        .play-btn { 
            width: 60px; height: 60px; border-radius: 50%; 
            background: var(--accent); color: #000; font-size: 1.5rem;
            display: flex; align-items: center; justify-content: center;
        }

        /* --- PROGRESS --- */
        .progress-container { width: 100%; height: 4px; background: rgba(255,255,255,0.05); border-radius: 2px; margin-top: 30px; cursor: pointer; }
        .progress-bar { height: 100%; width: 0%; background: var(--accent); border-radius: 2px; position: relative; }

        /* --- GUESTBOOK (Sleek UI) --- */
        .guestbook {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 25px;
        }
        .guestbook h3 { font-size: 1rem; color: var(--accent); margin-bottom: 15px; font-weight: 400; letter-spacing: 1px; }
        .input-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        textarea {
            background: rgba(0,0,0,0.2); border: 1px solid var(--border);
            border-radius: 10px; padding: 15px; color: #fff; resize: none; font-family: inherit; outline: none;
        }
        .submit-btn {
            background: var(--accent); border: none; padding: 10px; border-radius: 8px; 
            font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .submit-btn:hover { opacity: 0.8; }

        .comment-list { display: flex; flex-direction: column; gap: 15px; max-height: 250px; overflow-y: auto; }
        .comment-item { background: rgba(255,255,255,0.02); padding: 15px; border-radius: 12px; border-left: 3px solid var(--accent); }
        .comment-text { font-size: 0.9rem; line-height: 1.6; }
        .comment-date { font-size: 0.7rem; color: var(--text-dim); margin-top: 8px; display: block; }

        /* --- LIST --- */
        .playlist { display: flex; flex-direction: column; gap: 10px; }
        .track {
            padding: 15px 20px; border-radius: 15px; background: var(--glass);
            display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: 0.3s;
        }
        .track:hover { background: rgba(197, 163, 103, 0.1); }
        .track.active { background: rgba(197, 163, 103, 0.15); border: 1px solid var(--border); }
        .track-info-small h4 { font-size: 0.95rem; }
        .track-info-small p { font-size: 0.75rem; color: var(--text-dim); }

    </style>
</head>
<body>

<div class="wrapper">
    <header>
        <h1>playlistm</h1>
    </header>

    <div class="player-card">
        <div class="vinyl-box">
            <div class="vinyl" id="vinyl"></div>
        </div>
        <div class="info-box">
            <h2 id="title">Select a Track</h2>
            <p id="artist">Artist</p>
        </div>

        <div class="rating-box">
            <div class="stars" id="starContainer">
                <span class="star" data-v="1">★</span>
                <span class="star" data-v="2">★</span>
                <span class="star" data-v="3">★</span>
                <span class="star" data-v="4">★</span>
                <span class="star" data-v="5">★</span>
            </div>
        </div>

        <div class="progress-container" id="progressWrap">
            <div class="progress-bar" id="progressFill"></div>
        </div>

        <div class="controls">
            <button class="btn" id="prev">PREV</button>
            <button class="btn play-btn" id="play">▶</button>
            <button class="btn" id="next">NEXT</button>
        </div>
    </div>

    <div class="guestbook">
        <h3>GUESTBOOK</h3>
        <div class="input-group">
            <textarea id="commentInput" rows="3" placeholder="Write your thoughts..."></textarea>
            <button class="submit-btn" id="submitComment">POST</button>
        </div>
        <div class="comment-list" id="commentList"></div>
    </div>

    <div class="playlist" id="playlist"></div>
</div>

<audio id="mainAudio"></audio>

<script>
    const tracks = [
        { title: "Forgotten Light", artist: "000", src: "Forgotten Light.mp3" },
        { title: "Radio Distant Hiss", artist: "000", src: "Radio Distant Hiss.mp3" },
        { title: "Light Silence", artist: "000", src: "Light Silence.mp3" },
        { title: "Turned-Up Cup", artist: "000", src: "Turned-Up Cup.mp3" },
        { title: "Hallway Light", artist: "000", src: "Hallway Light.mp3" },
        { title: "Glass Without Purpose", artist: "000", src: "Glass Without Purpose.mp3" }
    ];

    let currentIdx = 0;
    let isPlaying = false;
    const audio = document.getElementById('mainAudio');

    // --- 핵심: 데이터 영구 보존 로직 (Key에 곡 제목 포함) ---
    function loadTrack(idx, playImmediately = false) {
        currentIdx = idx;
        const t = tracks[idx];
        document.getElementById('title').innerText = t.title;
        document.getElementById('artist').innerText = t.artist;
        audio.src = t.src;
        
        renderPlaylist();
        renderStars();
        renderComments();

        if (playImmediately) {
            audio.play();
            isPlaying = true;
            updatePlayBtn();
        }
    }

    function renderPlaylist() {
        const container = document.getElementById('playlist');
        container.innerHTML = tracks.map((t, i) => `
            <div class="track ${i === currentIdx ? 'active' : ''}" onclick="loadTrack(${i}, true)">
                <div class="track-info-small">
                    <h4>${t.title}</h4>
                    <p>${t.artist}</p>
                </div>
                <span style="font-size:0.7rem; color:var(--accent)">PLAY</span>
            </div>
        `).join('');
    }

    // --- RATING SYSTEM (Persistence) ---
    function renderStars() {
        const ratings = JSON.parse(localStorage.getItem('plm_ratings') || '{}');
        const score = ratings[tracks[currentIdx].title] || 0;
        document.querySelectorAll('.star').forEach(s => {
            s.classList.toggle('active', s.dataset.v <= score);
        });
    }

    document.querySelectorAll('.star').forEach(s => {
        s.onclick = () => {
            const ratings = JSON.parse(localStorage.getItem('plm_ratings') || '{}');
            ratings[tracks[currentIdx].title] = s.dataset.v;
            localStorage.setItem('plm_ratings', JSON.stringify(ratings));
            renderStars();
        };
    });

    // --- GUESTBOOK SYSTEM (Persistence) ---
    document.getElementById('submitComment').onclick = () => {
        const val = document.getElementById('commentInput').value.trim();
        if(!val) return;
        
        const comments = JSON.parse(localStorage.getItem('plm_comments') || '{}');
        const tKey = tracks[currentIdx].title;
        if(!comments[tKey]) comments[tKey] = [];
        
        comments[tKey].unshift({ text: val, date: new Date().toLocaleDateString() });
        localStorage.setItem('plm_comments', JSON.stringify(comments));
        
        document.getElementById('commentInput').value = '';
        renderComments();
    };

    function renderComments() {
        const comments = JSON.parse(localStorage.getItem('plm_comments') || '{}');
        const list = comments[tracks[currentIdx].title] || [];
        document.getElementById('commentList').innerHTML = list.map(c => `
            <div class="comment-item">
                <p class="comment-text">${c.text}</p>
                <span class="comment-date">${c.date}</span>
            </div>
        `).join('') || '<p style="text-align:center; opacity:0.3; font-size:0.8rem;">No comments yet.</p>';
    }

    // --- CONTROLS ---
    function updatePlayBtn() {
        document.getElementById('play').innerText = isPlaying ? '||' : '▶';
        document.getElementById('vinyl').classList.toggle('playing', isPlaying);
    }

    document.getElementById('play').onclick = () => {
        if(isPlaying) audio.pause(); else audio.play();
        isPlaying = !isPlaying;
        updatePlayBtn();
    };

    document.getElementById('next').onclick = () => loadTrack((currentIdx + 1) % tracks.length, isPlaying);
    document.getElementById('prev').onclick = () => loadTrack((currentIdx - 1 + tracks.length) % tracks.length, isPlaying);

    audio.ontimeupdate = () => {
        const pct = (audio.currentTime / audio.duration) * 100;
        document.getElementById('progressFill').style.width = pct + '%';
    };

    document.getElementById('progressWrap').onclick = (e) => {
        const rect = e.target.getBoundingClientRect();
        audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
    };

    // INIT
    loadTrack(0);
</script>
</body>
</html>
