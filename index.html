<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>playlistm</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet" />
    <style>
        :root {
            --bg-color: #0c0c0c;
            --card-bg: #151515;
            --accent: #d4af37;
            --text-main: #f0f0f0;
            --text-dim: #888;
            --border: rgba(212, 175, 55, 0.3);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg-color);
            color: var(--text-main);
            font-family: 'Noto Sans KR', sans-serif;
            background-image: radial-gradient(circle at top right, #1a1a1a, transparent);
            padding: 40px 20px;
        }

        .container { max-width: 450px; margin: 0 auto; display: flex; flex-direction: column; gap: 25px; }

        header h1 { 
            font-family: 'Cinzel', serif; text-align: center; font-size: 2.2rem; 
            letter-spacing: 8px; color: var(--accent); margin-bottom: 10px;
        }

        /* --- PLAYER --- */
        .player-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            border: 1px solid var(--border);
            text-align: center;
        }

        .vinyl {
            width: 180px; height: 180px; border-radius: 50%;
            background: radial-gradient(circle, #333 20%, #000 100%);
            margin: 0 auto 25px; border: 5px solid #111;
            position: relative; animation: rotate 10s linear infinite paused;
        }
        .vinyl.playing { animation-play-state: running; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .track-meta { margin-bottom: 20px; }
        .track-meta h2 { font-size: 1.4rem; font-family: 'Cinzel', serif; margin-bottom: 5px; }
        .track-meta p { color: var(--accent); font-size: 0.85rem; letter-spacing: 2px; }

        /* --- POST SECTION --- */
        .post-box {
            background: rgba(255,255,255,0.03);
            border-radius: 15px; padding: 20px; border: 1px solid rgba(255,255,255,0.05);
            margin-top: 20px;
        }
        .rating-row {
            display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 15px;
        }
        .stars { display: flex; gap: 5px; font-size: 1.5rem; cursor: pointer; }
        .star { color: #333; transition: 0.2s; }
        .star.selected { color: var(--accent); }

        textarea {
            width: 100%; background: #000; border: 1px solid #333; border-radius: 8px;
            padding: 12px; color: #fff; font-family: inherit; resize: none; outline: none; margin-bottom: 10px;
        }
        .submit-btn {
            width: 100%; background: var(--accent); color: #000; border: none;
            padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer;
        }

        /* --- COMMENT LIST --- */
        .comment-list { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; max-height: 200px; overflow-y: auto; }
        .comment-item { 
            background: #1a1a1a; padding: 12px; border-radius: 8px; font-size: 0.85rem; 
            border-left: 2px solid var(--accent); text-align: left;
        }
        .comment-item .score { color: var(--accent); font-weight: bold; margin-right: 8px; }
        .comment-item .date { font-size: 0.7rem; color: #555; display: block; margin-top: 5px; }

        /* --- PLAYLIST --- */
        .playlist { display: flex; flex-direction: column; gap: 8px; }
        .track-item {
            padding: 12px 20px; background: #151515; border-radius: 10px;
            display: flex; justify-content: space-between; align-items: center; cursor: pointer;
            border: 1px solid transparent;
        }
        .track-item.active { border-color: var(--accent); background: rgba(212, 175, 55, 0.05); }
        .track-item h4 { font-size: 0.9rem; }
        .track-item .track-score { color: var(--accent); font-size: 0.8rem; }

        .controls { display: flex; justify-content: center; gap: 30px; align-items: center; margin: 20px 0; }
        .play-btn { width: 50px; height: 50px; border-radius: 50%; background: var(--accent); color: #000; border: none; font-size: 1.2rem; cursor: pointer; }
        .nav-btn { background: none; border: 1px solid #333; color: #fff; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <header><h1>playlistm</h1></header>

    <div class="player-card">
        <div class="vinyl" id="vinyl"></div>
        <div class="track-meta">
            <h2 id="currentTitle">Select a Track</h2>
            <p id="currentArtist">Artist</p>
        </div>

        <div class="controls">
            <button class="nav-btn" onclick="prev()">PREV</button>
            <button class="play-btn" id="playBtn" onclick="togglePlay()">▶</button>
            <button class="nav-btn" onclick="next()">NEXT</button>
        </div>

        <div class="post-box">
            <div class="rating-row">
                <div class="stars" id="starSelector">
                    <span class="star" data-v="1">★</span>
                    <span class="star" data-v="2">★</span>
                    <span class="star" data-v="3">★</span>
                    <span class="star" data-v="4">★</span>
                    <span class="star" data-v="5">★</span>
                </div>
            </div>
            <textarea id="commentInput" placeholder="이 곡에 대한 평을 남겨주세요..."></textarea>
            <button class="submit-btn" id="postBtn" onclick="postComment()">POST (Firebase Required)</button>
        </div>

        <div class="comment-list" id="commentList"></div>
    </div>

    <div class="playlist" id="playlist"></div>
</div>

<audio id="audio"></audio>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  // --- 여기에 본인의 Firebase 설정값을 넣어야 합니다 ---
  const firebaseConfig = {
  apiKey: "AIzaSyA2CPROchP8jlqQJh7N8gGNapXL2sA__no",
  authDomain: "playlistm-63c47.firebaseapp.com",
  projectId: "playlistm-63c47",
  storageBucket: "playlistm-63c47.firebasestorage.app",
  messagingSenderId: "969610869879",
  appId: "1:969610869879:web:8343bb7f34243eddc1da72",
  measurementId: "G-E6L6Z0VX61"
};


  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const tracks = [
    { title: "Forgotten Light", artist: "000", src: "Forgotten Light.mp3" },
    { title: "Radio Distant Hiss", artist: "000", src: "Radio Distant Hiss.mp3" },
    { title: "Light Silence", artist: "000", src: "Light Silence.mp3" },
    { title: "Turned-Up Cup", artist: "000", src: "Turned-Up Cup.mp3" },
    { title: "Hallway Light", artist: "000", src: "Hallway Light.mp3" },
    { title: "Glass Without Purpose", artist: "000", src: "Glass Without Purpose.mp3" }
  ];

  let currentIdx = 0;
  let selectedScore = 0;
  const audio = document.getElementById('audio');

  // 별점 선택
  document.querySelectorAll('.star').forEach(s => {
    s.addEventListener('click', () => {
      selectedScore = parseInt(s.dataset.v);
      document.querySelectorAll('.star').forEach(el => {
        el.classList.toggle('selected', parseInt(el.dataset.v) <= selectedScore);
      });
    });
  });

  window.loadTrack = (idx, auto) => {
    currentIdx = idx;
    const t = tracks[idx];
    document.getElementById('currentTitle').innerText = t.title;
    document.getElementById('currentArtist').innerText = t.artist;
    audio.src = t.src;
    selectedScore = 0;
    document.querySelectorAll('.star').forEach(el => el.classList.remove('selected'));
    
    renderComments(t.title);
    renderPlaylist();

    if(auto) { 
      audio.play(); 
      document.getElementById('vinyl').classList.add('playing'); 
      document.getElementById('playBtn').innerText = '||'; 
    }
  };

  window.postComment = () => {
    const text = document.getElementById('commentInput').value.trim();
    if(!text || selectedScore === 0) { alert('별점과 내용을 입력해주세요!'); return; }
    
    const tTitle = tracks[currentIdx].title;
    const commentRef = ref(db, 'comments/' + tTitle.replace(/[.#$/\[\]]/g, "_"));
    
    push(commentRef, {
      score: selectedScore,
      text: text,
      date: new Date().toLocaleDateString()
    }).then(() => {
      document.getElementById('commentInput').value = '';
      selectedScore = 0;
      document.querySelectorAll('.star').forEach(el => el.classList.remove('selected'));
    }).catch(e => {
        alert("Firebase 설정이 필요합니다. 코드를 확인해주세요.");
    });
  };

  function renderComments(title) {
    const safeTitle = title.replace(/[.#$/\[\]]/g, "_");
    const commentRef = ref(db, 'comments/' + safeTitle);
    
    onValue(commentRef, (snapshot) => {
      const data = snapshot.val();
      const listDiv = document.getElementById('commentList');
      if (data) {
        const items = Object.values(data).reverse();
        listDiv.innerHTML = items.map(c => `
          <div class="comment-item">
            <span class="score">★ ${c.score}</span> ${c.text}
            <span class="date">${c.date}</span>
          </div>
        `).join('');
      } else {
        listDiv.innerHTML = '<p style="font-size:0.7rem; opacity:0.3;">첫 평점을 남겨보세요.</p>';
      }
    });
  }

  function renderPlaylist() {
    const playlistDiv = document.getElementById('playlist');
    playlistDiv.innerHTML = tracks.map((t, i) => {
      return `
        <div class="track-item ${i === currentIdx ? 'active' : ''}" onclick="loadTrack(${i}, true)">
          <div><h4>${t.title}</h4><p style="font-size:0.7rem; color:#666">${t.artist}</p></div>
          <div class="track-score" id="avg-${t.title.replace(/\s/g, '')}">★ -</div>
        </div>
      `;
    }).join('');
    
    // 평균 평점 실시간 업데이트 (Firebase)
    tracks.forEach(t => {
        const safeTitle = t.title.replace(/[.#$/\[\]]/g, "_");
        onValue(ref(db, 'comments/' + safeTitle), (snap) => {
            const data = snap.val();
            if(data) {
                const vals = Object.values(data);
                const avg = (vals.reduce((a,b) => a + Number(b.score), 0) / vals.length).toFixed(1);
                const target = document.getElementById('avg-' + t.title.replace(/\s/g, ''));
                if(target) target.innerText = '★ ' + avg;
            }
        });
    });
  }

  window.togglePlay = () => {
    if(audio.paused) { audio.play(); document.getElementById('playBtn').innerText = '||'; document.getElementById('vinyl').classList.add('playing'); }
    else { audio.pause(); document.getElementById('playBtn').innerText = '▶'; document.getElementById('vinyl').classList.remove('playing'); }
  };
  window.next = () => loadTrack((currentIdx + 1) % tracks.length, true);
  window.prev = () => loadTrack((currentIdx - 1 + tracks.length) % tracks.length, true);

  loadTrack(0, false);
</script>
</body>
</html>
